<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0f; color: #e0e0e0; }
.header { background: linear-gradient(135deg, #1a1a3e, #0a0a1e); padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2a2a5e; }
.header h1 { font-size: 22px; color: #fff; }
.header .subtitle { color: #888; font-size: 13px; }
.tabs { display: flex; gap: 0; background: #111; border-bottom: 2px solid #222; }
.tab { padding: 12px 24px; cursor: pointer; color: #888; font-size: 14px; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: #fff; background: #1a1a2e; }
.tab.active { color: #7eb8ff; border-bottom-color: #7eb8ff; background: #111; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Map */
#map { width: 100%; height: 70vh; }
#search-container { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000; }
#search-box { width: 350px; padding: 12px 18px; font-size: 15px; border: none; border-radius: 25px; background: rgba(255,255,255,0.95); box-shadow: 0 2px 12px rgba(0,0,0,0.35); outline: none; color: #1a1a3e; }
#search-box::placeholder { color: #999; }
#search-results { background: white; border-radius: 12px; margin-top: 6px; max-height: 300px; overflow-y: auto; box-shadow: 0 4px 16px rgba(0,0,0,0.3); display: none; }
.search-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; color: #333; }
.search-item:hover { background: #f0f0f5; }
.search-item .s-name { font-weight: bold; color: #1a1a3e; }
.search-item .s-cat { color: #888; font-size: 11px; }
.search-count { text-align: center; padding: 6px; color: #888; font-size: 11px; }

/* Storage */
.storage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; padding: 20px; }
.drive-card { background: #151520; border: 1px solid #2a2a3e; border-radius: 10px; padding: 16px; }
.drive-name { font-weight: bold; font-size: 15px; color: #7eb8ff; }
.drive-id { font-size: 10px; color: #666; font-family: monospace; }
.drive-bar { height: 10px; background: #222; border-radius: 5px; margin: 10px 0; overflow: hidden; }
.drive-fill { height: 100%; border-radius: 5px; transition: width 0.3s; }
.drive-stats { display: flex; justify-content: space-between; font-size: 12px; color: #888; }
.drive-updated { font-size: 10px; color: #555; margin-top: 6px; }

/* Stats bar */
.stats-bar { display: flex; gap: 20px; padding: 20px; background: #111; border-bottom: 1px solid #222; flex-wrap: wrap; }
.stat-box { background: #1a1a2e; border: 1px solid #2a2a4e; border-radius: 8px; padding: 12px 20px; min-width: 150px; }
.stat-num { font-size: 24px; font-weight: bold; color: #7eb8ff; }
.stat-label { font-size: 11px; color: #888; }

/* Data table */
.data-search { padding: 15px 20px; background: #111; }
.data-search input { width: 100%; padding: 10px 16px; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table th { background: #1a1a3e; color: #7eb8ff; padding: 10px 12px; text-align: left; position: sticky; top: 0; cursor: pointer; }
.data-table th:hover { background: #2a2a5e; }
.data-table td { padding: 8px 12px; border-bottom: 1px solid #1a1a2e; }
.data-table tr:hover { background: #151525; }
.table-container { max-height: 60vh; overflow-y: auto; }
.size-bar { display: inline-block; height: 6px; background: #457b9d; border-radius: 3px; margin-left: 6px; vertical-align: middle; }
</style>
</head>

<div class="header">

<div id="tab-missions" class="tab-content active" style="position:relative;">
    <div id="search-container">

                    <th onclick="sortTable(2)">Files</th>

            </thead>
            <tbody id="inv-body"></tbody>
        </table>
    </div>
</div>

// Tab switching
function showTab(name) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    event.target.classList.add('active');
    if (name === 'missions') { setTimeout(() => map.invalidateSize(), 100); }
}

function renderInventory(data) {
    tbody.innerHTML = '';

    renderInventory(filtered);
}

var sortDir = 1;
function sortTable(col) {
    var keys = ['driveLabel', 'name', 'files', 'sizeGB', 'types'];
    folders.sort(function(a, b) {
        var va = a[keys[col]], vb = b[keys[col]];

}

    var color = colors[loc.category] || '#457b9d';
    L.circleMarker([loc.lat, loc.lng], {
        radius: Math.min(3 + Math.sqrt(loc.activity) * 0.5, 15),
        fillColor: color, color: '#fff', weight: 1, fillOpacity: 0.85
    }).bindPopup('<b>' + loc.name + '</b><br><span style="color:' + color + '">' + loc.category + '</span><br>Activity: ' + loc.activity).addTo(map);
});

// Search
var searchBox = document.getElementById('search-box');
var searchResults = document.getElementById('search-results');
searchBox.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    searchResults.innerHTML = '';
    if (q.length < 2) { searchResults.style.display = 'none'; return; }
    var matches = locations.filter(l => l.name.toLowerCase().includes(q) || l.category.toLowerCase().includes(q));
    if (!matches.length) { searchResults.innerHTML = '<div class="search-count">No results</div>'; searchResults.style.display = 'block'; return; }
    matches.slice(0, 20).forEach(function(loc) {
        var div = document.createElement('div');
        div.className = 'search-item';
        div.innerHTML = '<div class="s-name">' + loc.name + '</div><div class="s-cat">' + loc.category + ' · ' + loc.activity + ' events</div>';
        div.addEventListener('click', function() { map.setView([loc.lat, loc.lng], 16); searchResults.style.display = 'none'; searchBox.value = loc.name; });
        searchResults.appendChild(div);
    });
    searchResults.style.display = 'block';
});
document.addEventListener('click', function(e) { if (!document.getElementById('search-container').contains(e.target)) searchResults.style.display = 'none'; });
