<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DORSET DOOM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0000;color:#fff;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.container{text-align:center;position:relative;z-index:2}
.cover{width:min(500px,90vw);border:3px solid #331100;box-shadow:0 0 60px rgba(255,60,0,.3),0 0 120px rgba(255,30,0,.15);margin-bottom:40px;animation:glow 4s ease-in-out infinite}
.status{font-size:12px;letter-spacing:6px;color:#ff4400;margin-bottom:12px;text-shadow:0 0 20px rgba(255,60,0,.5)}
.sub{font-size:10px;letter-spacing:4px;color:#442200;margin-bottom:40px}
.download{display:inline-block;padding:12px 32px;border:1px solid #ff4400;color:#ff4400;font-size:11px;letter-spacing:4px;text-decoration:none;font-family:'Courier New',monospace;transition:all .3s}
.download:hover{background:#ff4400;color:#000}
.scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,50,0,.015) 2px,rgba(255,50,0,.015) 4px);pointer-events:none;z-index:3}
.vignette{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,.9) 100%);pointer-events:none;z-index:3}
@keyframes glow{0%,100%{box-shadow:0 0 60px rgba(255,60,0,.3),0 0 120px rgba(255,30,0,.15)}50%{box-shadow:0 0 80px rgba(255,60,0,.5),0 0 160px rgba(255,30,0,.25)}}
.back{position:fixed;bottom:20px;font-size:10px;letter-spacing:3px;color:#221100;text-decoration:none;z-index:4}
.back:hover{color:#ff4400}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="vignette"></div>
<div class="container">
<img class="cover" src="dorset-doom.jpg" alt="DORSET DOOM">
<div class="status">▓▓▓▓▓▓▓░░░ COMING SOON</div>
<div class="sub">A RIOT LABORATORIES PRODUCTION</div>
</div>
<a class="back" href="../">← RETURN TO BASE</a>
</body>
</html>
