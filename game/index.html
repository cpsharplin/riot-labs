<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DORSET DOOM</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.container{text-align:center;position:relative;z-index:2}
img{width:200px;margin-bottom:40px;filter:invert(1);animation:pulse 3s ease-in-out infinite}
h1{font-size:clamp(48px,8vw,96px);letter-spacing:12px;margin-bottom:16px;text-shadow:0 0 40px rgba(255,0,0,.4),0 0 80px rgba(255,0,0,.2)}
.sub{font-size:14px;letter-spacing:6px;color:#666;margin-bottom:60px}
.status{font-size:11px;letter-spacing:4px;color:#333;animation:blink 2s ease-in-out infinite}
.scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.02) 2px,rgba(255,255,255,.02) 4px);pointer-events:none;z-index:3}
.vignette{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.8) 100%);pointer-events:none;z-index:3}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.back{position:fixed;bottom:20px;font-size:10px;letter-spacing:3px;color:#222;text-decoration:none;z-index:4}
.back:hover{color:#444}
</style>
</head>
<body>
<div class="scanline"></div>
<div class="vignette"></div>
<div class="container">
<img src="riot-logo.jpg" alt="Riot Laboratories">
<h1>DORSET DOOM</h1>
<div class="sub">A RIOT LABORATORIES PRODUCTION</div>
<div class="status">▓▓▓▓▓▓▓░░░ LOADING... COMING SOON</div>
</div>
<a class="back" href="../">← RETURN TO BASE</a>
</body>
</html>
