// Create marker cluster groups per category
var clusterGroups = {};
var categoryLayers = {};

Object.keys(colors).forEach(function(cat) {
    var group = L.markerClusterGroup({
        maxClusterRadius: 40,
        iconCreateFunction: function(cluster) {
            var count = cluster.getChildCount();
            var size = count < 10 ? 'small' : count < 50 ? 'medium' : 'large';
            return L.divIcon({
                html: '<div style="background:' + colors[cat] + ';color:white;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;border:2px solid white;">' + count + '</div>',
                className: 'marker-cluster',
                iconSize: L.point(40, 40)
            });
        }
    });
    clusterGroups[cat] = group;
    categoryLayers[cat] = group;
});

locations.forEach(function(loc) {
    var color = colors[loc.category] || '#457b9d';
    var marker = L.circleMarker([loc.lat, loc.lng], {
        radius: Math.min(3 + Math.sqrt(loc.activity) * 0.5, 15),
        fillColor: color,
        color: '#fff',
        weight: 1,
        fillOpacity: 0.85
    });
    
    marker.bindPopup(
        '<div style="min-width:200px">' +
        '<b style="font-size:14px">' + loc.name + '</b><br>' +
        '<span style="color:' + color + ';font-weight:bold">' + loc.category + '</span><br>' +
        'Activity: ' + loc.activity + ' events<br>' +
        'Coords: ' + loc.lat.toFixed(4) + ', ' + loc.lng.toFixed(4) +
        '</div>'
    );
    
    if (clusterGroups[loc.category]) {
        clusterGroups[loc.category].addLayer(marker);
    }
});

Object.values(clusterGroups).forEach(function(g) { g.addTo(map); });

// Layer control
L.control.layers(null, categoryLayers, { collapsed: false, position: 'topright' }).addTo(map);

// Legend
var legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
    var div = L.DomUtil.create('div', 'legend');
    div.innerHTML = '<div class="legend-title">Mission Categories</div>';
    var cats = {"Commercial Inspection": 380, "Arizona Operations": 23, "Test/QA": 13, "Harvest Midstream": 8, "Sherwin-Williams": 6, "DI HQ (Lafayette)": 2};
    Object.keys(cats).forEach(function(cat) {
        div.innerHTML += '<div><i style="background:' + (colors[cat]||'#457b9d') + '"></i>' + cat + ' (' + cats[cat] + ')</div>';
    });
    return div;
};
legend.addTo(map);

// Stats box
var stats = L.control({ position: 'topleft' });
stats.onAdd = function() {
    var div = L.DomUtil.create('div', 'stats-box');
    div.innerHTML = '<div class="stats-title">DRONE INSTITUTE</div>' +
        '<div class="stats-num">432</div>' +
        '<div>Mission Locations</div>' +
        '<div style="margin-top:4px;color:#666;font-size:11px">6 categories across the US</div>';
    return div;
};
stats.addTo(map);
